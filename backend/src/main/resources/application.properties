spring.application.name=finance-app
spring.sql.init.mode=always
app.bootstrap-data=false
app.bootstrap-transaction-data=false
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:8080

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Test Environment Settings
app.bootstrap-test-runner=true