# Supabase PostgreSQL Configuration
# Get your connection details from: https://app.supabase.com/project/[your-project-id]/settings/database

# Disable Docker Compose auto-start when using Supabase profile
spring.docker.compose.enabled=false

# Disable bootstrap data seeding - Supabase DB manages its own data
app.bootstrap-data=false
app.bootstrap-transaction-data=false
app.bootstrap-expense-data=false
app.bootstrap-earnings-data=false

spring.datasource.url=jdbc:postgresql://${SUPABASE_HOST:your-project.supabase.co}:${SUPABASE_PORT:5432}/${SUPABASE_DATABASE:postgres}?sslmode=require
spring.datasource.username=${SUPABASE_USER:postgres}
spring.datasource.password=${SUPABASE_PASSWORD:your-password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool Settings (important for Supabase due to connection limits)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
