spring:
  application:
    name: finance-app
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:docker}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  # docker:
  #   compose:
  #     enabled: false

server:
  port: ${PORT:8080}

cors:
  allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:8080

management:
  endpoints:
    web:
      exposure:
        include: mappings
