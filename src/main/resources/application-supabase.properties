# Supabase PostgreSQL Configuration
# Get your connection details from: https://app.supabase.com/project/[your-project-id]/settings/database

# Disable Docker Compose auto-start when using Supabase profile
spring.docker.compose.enabled=false

# Disable bootstrap data seeding - Supabase DB manages its own data
app.bootstrap-data=false
app.bootstrap-transaction-data=false
app.bootstrap-expense-data=false
app.bootstrap-earnings-data=false

# Spring Data JDBC Configuration for Supabase (Session Pooler - IPv4 compatible, port 5432)
spring.datasource.url=jdbc:postgresql://${SUPABASE_HOST}:${SUPABASE_PORT}/${SUPABASE_DATABASE}?sslmode=require
spring.datasource.username=${SUPABASE_USER}
spring.datasource.password=${SUPABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.sql.init.mode=always

# Connection Pool Settings (important for Supabase due to connection limits)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
